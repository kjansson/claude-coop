global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── Envoy admin metrics ────────────────────────
  - job_name: "envoy"
    metrics_path: /stats/prometheus
    static_configs:
      - targets: ["envoy:9901"]
        labels:
          instance: "envoy-proxy"

  # ── Claude Code metrics (Prometheus exporter) ─
  - job_name: "claude"
    metrics_path: /metrics
    static_configs:
      - targets: ["claude:9464"]

  # ── Claude Code status-line metrics (context window) ──
  - job_name: "claude-statusline"
    metrics_path: /metrics
    static_configs:
      - targets: ["claude:9465"]
        labels:
          instance: "claude-statusline"

  # ── Prometheus self-monitoring ─────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
